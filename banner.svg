<svg width="1200" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001838"/>
      <stop offset="50%" stop-color="#00123a"/>
      <stop offset="100%" stop-color="#000c28"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0056d6"/>
      <stop offset="50%" stop-color="#003087"/>
      <stop offset="100%" stop-color="#001a4d"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#0056d6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0056d6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="12"/>
  <!-- Radial glow top-left -->
  <rect width="1200" height="220" fill="url(#glow)" rx="12"/>

  <!-- PS button symbols watermark — 2x2 grid, far right -->
  <text x="1086" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="white" fill-opacity="0.10">△</text>
  <text x="1148" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="white" fill-opacity="0.10">○</text>
  <text x="1086" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="white" fill-opacity="0.10">✕</text>
  <text x="1148" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="white" fill-opacity="0.10">□</text>

  <!-- PS3 text watermark — bottom right -->
  <text x="980" y="208" font-family="Arial Black, Arial, sans-serif" font-size="92" font-weight="900" fill="white" fill-opacity="0.04" text-anchor="middle" letter-spacing="-2">PS3</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="220" fill="url(#bar)" rx="2"/>

  <!-- Eyebrow label -->
  <text x="36" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#0056d6" letter-spacing="3">PLAYSTATION 3 · CUSTOM FIRMWARE</text>

  <!-- Main title -->
  <text x="36" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="-1" fill="white">PS3 FPS <tspan fill="#4da3ff">Unlock Patches</tspan></text>

  <!-- Tagline -->
  <text x="36" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="white" fill-opacity="0.45">RPCS3 patches converted to Artemis .ncl format — for real PS3 hardware with CFW</text>

  <!-- Stat pill 1: 39 confirmed games -->
  <rect x="36" y="158" width="188" height="34" fill="#003887" fill-opacity="0.30" rx="6"/>
  <rect x="36" y="158" width="188" height="34" fill="none" stroke="#0056d6" stroke-opacity="0.40" stroke-width="1" rx="6"/>
  <text x="130" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#7eb8ff"><tspan fill="white">39</tspan> confirmed games</text>

  <!-- Stat pill 2: 2,526 patch files -->
  <rect x="234" y="158" width="188" height="34" fill="#003887" fill-opacity="0.30" rx="6"/>
  <rect x="234" y="158" width="188" height="34" fill="none" stroke="#0056d6" stroke-opacity="0.40" stroke-width="1" rx="6"/>
  <text x="328" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#7eb8ff"><tspan fill="white">2,526</tspan> patch files</text>

  <!-- Stat pill 3: Artemis + PS3MAPI -->
  <rect x="432" y="158" width="172" height="34" fill="#003887" fill-opacity="0.30" rx="6"/>
  <rect x="432" y="158" width="172" height="34" fill="none" stroke="#0056d6" stroke-opacity="0.40" stroke-width="1" rx="6"/>
  <text x="518" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#7eb8ff">Artemis + PS3MAPI</text>

  <!-- Outer border -->
  <rect width="1200" height="220" fill="none" stroke="#0056d6" stroke-opacity="0.25" stroke-width="1" rx="12"/>
</svg>
